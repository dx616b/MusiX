# Optional local Prowlarr + Jackett + Transmission (no ../streamx required).
# Usage:
#   cp config/config.bundled.yaml.example config/config.docker.yaml
#   docker compose -f docker-compose.yml -f docker-compose.bundled.yml up --build -d
services:
  musix:
    depends_on:
      prowlarr:
        condition: service_started
      jackett:
        condition: service_started
      transmission:
        condition: service_started

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    ports:
      - "9696:9696"
    volumes:
      - prowlarr-config:/config
    restart: unless-stopped

  jackett:
    image: lscr.io/linuxserver/jackett:latest
    ports:
      - "9117:9117"
    volumes:
      - jackett-config:/config
    restart: unless-stopped

  transmission:
    image: lscr.io/linuxserver/transmission:latest
    ports:
      - "9091:9091"
    environment:
      PUID: "1000"
      PGID: "1000"
    volumes:
      - transmission-config:/config
      - ./downloads:/downloads
    restart: unless-stopped

volumes:
  prowlarr-config:
  jackett-config:
  transmission-config:
