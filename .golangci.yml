version: "2"

# v2 has no run.skip-dirs. Default `golangci-lint run` uses `./...`, which walks the whole
# module tree and fails on unreadable paths. Use: golangci-lint run ./internal/... ./cmd/...
run:
  timeout: 10m
  tests: true

linters:
  default: none
  enable:
    - govet
    - ineffassign
    - misspell
    - staticcheck
    - unused
  settings:
    staticcheck:
      checks:
        - all
        - "-ST1000"
        - "-ST1003"
        - "-ST1020"
