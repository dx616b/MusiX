name: Docker release

# Production channel: semver + latest + immutable sha-* (git tag v* must match VERSION.txt).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: docker-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v5

      - name: Version from tag
        id: ver
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            ver="${GITHUB_REF_NAME#v}"
          else
            ver="$(tr -d '[:space:]' < VERSION.txt)"
          fi
          file_ver="$(tr -d '[:space:]' < VERSION.txt)"
          if [ "$ver" != "$file_ver" ]; then
            echo "::error::Tag version $ver does not match VERSION.txt ($file_ver)"
            exit 1
          fi
          echo "version=$ver" >> "$GITHUB_OUTPUT"

  build-push:
    needs: version
    uses: ./.github/workflows/docker-build.yml
    secrets: inherit
    with:
      metadata_tags: |
        type=raw,value=${{ needs.version.outputs.version }},enable=true
        type=raw,value=latest,enable=true
        type=sha,prefix=sha-,format=short
