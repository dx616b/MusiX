name: Docker release

# Prod images: semver from git tag v* (matches VERSION.txt). Also :latest on release.
# Prod should pin dx616b/musix:<version>, not :latest or :nightly.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: docker-release-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: dx616b/musix

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - name: Version from tag
        id: ver
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            ver="${GITHUB_REF_NAME#v}"
          else
            ver="$(tr -d '[:space:]' < VERSION.txt)"
          fi
          file_ver="$(tr -d '[:space:]' < VERSION.txt)"
          if [ "$ver" != "$file_ver" ]; then
            echo "::error::Tag version $ver does not match VERSION.txt ($file_ver)"
            exit 1
          fi
          echo "version=$ver" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.ver.outputs.version }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
