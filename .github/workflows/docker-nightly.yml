name: Docker nightly

# Daily preview snapshot from main. Does not update :latest or semver tags.
on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

concurrency:
  group: docker-nightly
  cancel-in-progress: false

env:
  IMAGE: dx616b/musix

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5
        with:
          ref: main

      - name: Date tag
        id: meta
        run: echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:nightly
            ${{ env.IMAGE }}:nightly-${{ steps.meta.outputs.date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
