name: Docker nightly

# Daily preview snapshot from main (immutable sha-* for that commit).
on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

concurrency:
  group: docker-nightly
  cancel-in-progress: false

jobs:
  resolve-main:
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.main.outputs.sha }}
      date: ${{ steps.date.outputs.date }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 1

      - id: main
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - id: date
        run: echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

  build-push:
    needs: resolve-main
    uses: ./.github/workflows/docker-build.yml
    secrets: inherit
    with:
      ref: ${{ needs.resolve-main.outputs.sha }}
      metadata_tags: |
        type=raw,value=nightly,enable=true
        type=raw,value=nightly-${{ needs.resolve-main.outputs.date }},enable=true
        type=sha,prefix=sha-,format=short
