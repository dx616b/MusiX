name: Docker edge

# Preview channel: every merge to main. Does not update :latest or semver tags.
on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: docker-edge-${{ github.sha }}
  cancel-in-progress: true

env:
  IMAGE: dx616b/musix

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - name: Short SHA
        id: meta
        run: echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:edge
            ${{ env.IMAGE }}:sha-${{ steps.meta.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
